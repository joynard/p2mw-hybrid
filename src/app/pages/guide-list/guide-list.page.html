<ion-content class="ion-padding">
  <div class="page-header">
    <h1 class="title">Temukan Teman Jalan</h1>

  <ion-searchbar placeholder="Cari kota (Surabaya, Bandung...)" class="amigo-search"></ion-searchbar>

  <div class="guide-container">

        <div class="price-badge">Rp 100rb<span>/hari</span></div>
      </div>
      
      <div class="guide-info">
        <ion-avatar class="guide-avatar">
          <img src="https://ui-avatars.com/api/?name=Andi+Pratama&background=0abab5&color=fff" />
        </ion-avatar>
        
        <div class="text-details">
          <div class="name-row">
            <h3>Andi Pratama</h3>
            <div class="rating">
              <ion-icon name="star"></ion-icon> 4.8
            </div>
          </div>
          <p class="uni">Institut Teknologi Bandung</p>
          <p class="location"><ion-icon name="location-outline"></ion-icon> Bandung, Jawa Barat</p>
          
          <div class="tags">
            <span>Kuliner</span>
            <span>Historical</span>
            <span>Hidden Gem</span>
          </div>
        </div>
      </div>
    </ion-card>

    <ion-card class="guide-card">
      <div class="guide-banner">

        <div class="price-badge">Rp 75rb<span>/hari</span></div>
      </div>
      
      <div class="guide-info">

        </ion-avatar>
        
        <div class="text-details">
          <div class="name-row">
            <h3>Siti Aisyah</h3>
            <div class="rating">
              <ion-icon name="star"></ion-icon> 5.0
            </div>
          </div>
